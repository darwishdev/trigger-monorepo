{{define "layout"}}<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{.Title}}</title>
  <meta name="theme-color" content="#0d1b18">
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" href="/static/logo.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="/static/icon-192.png">
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => navigator.serviceWorker.register('/sw.js'));
    }
  </script>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f6f8f7;
      color: #0d1b18;
    }
    a { color: inherit; text-decoration: none; }
    nav {
      display: flex;
      align-items: center;
      gap: .5rem;
      padding: .85rem 1.25rem;
      border-bottom: 1px solid #dde6e3;
      background: #ffffff;
    }
    .brand {
      display: inline-flex;
      align-items: center;
      gap: .65rem;
      margin-right: auto;
      font-weight: 700;
    }
    .brand img { width: 2rem; height: 2rem; border-radius: 8px; }
    .link {
      padding: .45rem .75rem;
      border-radius: 8px;
      color: #51615d;
      font-size: .95rem;
    }
    .link:hover,
    .link.active {
      background: #e6fbf7;
      color: #0d1b18;
    }
    #content {
      min-height: calc(100vh - 8.75rem);
      padding: 3rem 1.25rem;
    }
    .shell {
      width: min(56rem, 100%);
      margin: 0 auto;
    }
    .eyebrow {
      margin: 0 0 .75rem;
      color: #24796f;
      font-size: .85rem;
      font-weight: 700;
      text-transform: uppercase;
    }
    h1 {
      margin: 0;
      max-width: 42rem;
      font-size: clamp(2rem, 5vw, 4.25rem);
      line-height: 1.03;
      font-weight: 750;
    }
    p {
      max-width: 39rem;
      margin: 1rem 0 0;
      color: #51615d;
      font-size: 1.05rem;
      line-height: 1.65;
    }
    .status-row {
      display: flex;
      flex-wrap: wrap;
      gap: .75rem;
      margin-top: 1.75rem;
    }
    .status {
      display: inline-flex;
      align-items: center;
      gap: .5rem;
      min-height: 2.5rem;
      padding: .55rem .8rem;
      border: 1px solid #c9d8d4;
      border-radius: 8px;
      background: #ffffff;
      color: #0d1b18;
      font-size: .95rem;
    }
    .dot {
      width: .55rem;
      height: .55rem;
      border-radius: 999px;
      background: #6be4d3;
    }
    footer {
      padding: 1rem 1.25rem;
      border-top: 1px solid #dde6e3;
      color: #6b7875;
      background: #ffffff;
      font-size: .9rem;
    }
    footer .inner {
      width: min(56rem, 100%);
      margin: 0 auto;
    }
  </style>
</head>
<body>
  {{template "nav" .}}
  <main id="content">{{template "content" .}}</main>
  {{template "footer" .}}
</body>
</html>{{end}}
